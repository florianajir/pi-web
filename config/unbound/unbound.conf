server:
  # Listen on all interfaces inside the container; Pi-hole reaches this over Docker network.
  interface: 0.0.0.0
  port: 5335

  # Allow recursive queries from local container namespace and Pi-hole on dns_internal.
  access-control: 127.0.0.0/8 allow
  access-control: 172.30.53.0/24 allow

  # Network behavior
  do-ip4: yes
  do-ip6: no
  prefer-ip6: no
  do-udp: yes
  do-tcp: yes
  edns-buffer-size: 1232

  # Privacy hardening
  qname-minimisation: yes
  hide-identity: yes
  hide-version: yes
  use-caps-for-id: no

  # DNSSEC / cache tuning
  harden-dnssec-stripped: yes
  prefetch: yes
  prefetch-key: yes
  cache-min-ttl: 300
  cache-max-ttl: 86400

  # Basic anti-rebinding protections
  private-address: 10.0.0.0/8
  private-address: 172.16.0.0/12
  private-address: 192.168.0.0/16
  private-address: 169.254.0.0/16
  private-address: fd00::/8
  private-address: fe80::/10

  # Keep resource usage modest for Raspberry Pi
  num-threads: 1
  # Pi-hole may briefly fan out multiple TCP upstream queries during startup or
  # gravity/list updates; raise the default TCP limits so Unbound doesn't close
  # connections under that short burst.
  incoming-num-tcp: 20
  outgoing-num-tcp: 40
  num-queries-per-thread: 2048
  so-rcvbuf: 1m
  so-sndbuf: 1m

remote-control:
  control-enable: no
