server:
  # Listen on port 5335 (Pi-hole uses this as upstream resolver).
  port: 5335

  # Allow access from Pi-hole over the dns_internal Docker network.
  access-control: 172.30.53.0/24 allow

  # Disable IPv6 (not used in this stack).
  do-ip6: no
  prefer-ip6: no

  # Privacy hardening
  hide-identity: yes
  hide-version: yes
  qname-minimisation: yes

  # Cache tuning
  cache-min-ttl: 300
  cache-max-ttl: 86400

  # Keep resource usage modest for Raspberry Pi.
  # so-rcvbuf/so-sndbuf: 0 disables socket buffer tuning to avoid the CAP_NET_ADMIN
  # capability requirement; non-zero values need elevated privileges in containers.
  so-rcvbuf: 0
  so-sndbuf: 0

remote-control:
  control-enable: no
