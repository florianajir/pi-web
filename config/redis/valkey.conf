# Valkey/Redis configuration for pi-web stack
# Optimized for low-memory Raspberry Pi usage

# Snapshotting (RDB persistence)
save 900 1
save 300 10
save 60 10000

# Append-only file (disabled — RDB is sufficient for cache workloads)
appendonly no

# Memory management
maxmemory 200mb
maxmemory-policy volatile-lru

# Logging
loglevel notice

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# Performance: keep TCP backlog reasonable
tcp-backlog 128

# Timeout idle connections after 5 minutes
timeout 300

# Reduce latency from background saves
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
