# Enable IP forwarding for Tailscale subnet routing/exit-node
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Reduce swap usage - prefer RAM over swap (default is 60)
# Lower values make kernel less aggressive about swapping
vm.swappiness = 10

# Redis/Valkey: allow memory overcommit for background saves and replication
# Without this, fork-based persistence may fail under low memory conditions
vm.overcommit_memory = 1

# Unbound: increase socket buffer sizes to 1 MB for DNS resolver performance
net.core.rmem_max = 1048576
net.core.wmem_max = 1048576
