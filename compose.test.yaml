# Test-specific Docker Compose configuration
# This file extends compose.yaml and overrides only the parts needed for CI/testing.
# Usage: docker compose -f compose.yaml -f compose.test.yaml up -d

services:
  # --- Services excluded from CI ---
  # These services need special hardware, real credentials, or capabilities that are
  # unavailable on GitHub Actions runners.

  tailscale:
    # Requires /dev/net/tun, SYS_MODULE capability, and real VPN auth.
    profiles: [ci-excluded]

  headplane:
    profiles: [ci-excluded]

  beszel-agent:
    # Depends on Traefik TLS endpoint which is not functional in CI.
    profiles: [ci-excluded]

  ddns-updater:
    # Requires valid Cloudflare zone and API token.
    profiles: [ci-excluded]

  backrest:
    # Depends on the full healthy stack; not suitable for CI.
    profiles: [ci-excluded]

  headscale:
    # Fetches OIDC discovery from https://auth.test.local at startup, which does
    # not resolve on GitHub Actions runners.
    profiles: [ci-excluded]

  # --- nextcloud: replace host bind mounts with named volumes for CI ---
  # In CI the host directories (./data/nextcloud-config, ./data/nextcloud) do not
  # pre-exist, so Docker creates them as root:root.  Nextcloud runs as www-data
  # (uid 33) and cannot write to those directories, which prevents first-run
  # initialisation and makes the health check fail.  Named Docker volumes are
  # initialised with the correct ownership by the container runtime.
  # start_period is extended because the initial DB installation takes >30s.
  nextcloud:
    volumes: !override
      - nextcloud_html:/var/www/html
      - nextcloud_ci_data:/var/www/html/data
      - nextcloud_ci_config:/var/www/html/config
      - nextcloud_ci_themes:/var/www/html/themes
      - ./config/nextcloud/custom.config.php:/var/www/html/config/custom.config.php:ro
      - ./config/nextcloud/security-headers.conf:/etc/apache2/conf-enabled/security-headers.conf:ro
    healthcheck:
      # Accept both 200 (ready) and 503 (still initialising DB) as healthy for CI.
      # The Dagger smoke-test health check separately verifies the final state.
      test: ["CMD-SHELL", "curl -sS -o /dev/null -w '%{http_code}' http://localhost/status.php | grep -qE '^(200|503)$'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- postgres: replace host bind mount with a named volume for CI ---
  # The host ./data/postgres directory may contain production data initialised with
  # a different PASSWORD.  Using a named volume guarantees a fresh database is
  # created with the CI PASSWORD so lldap/authelia/immich/nextcloud can all
  # authenticate successfully.
  postgres:
    volumes: !override
      - postgres_ci_data:/var/lib/postgresql/data
      - ./config/postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh

  # --- lldap: set JWT secret inline for CI ---
  # The lldap.env file is created by authelia-pre-start.sh with mode 600; Docker Compose
  # cannot open it when running as the CI user even with required: false.  Reset env_file to
  # an empty list and inject LLDAP_JWT_SECRET directly so lldap starts successfully.
  lldap:
    env_file: !reset []
    environment:
      LLDAP_JWT_SECRET: ci-jwt-secret-for-testing-placeholder

  # --- unbound: use multi-arch image for CI (mvance/unbound-rpi is ARM-only) ---
  # klutchell/unbound is a distroless image; pass -d to stay in foreground.
  # The drill binary is broken on some ARM64 kernels; use unbound-host instead.
  unbound:
    image: klutchell/unbound:latest
    command: ["-d"]
    volumes: !override
      - ./config/unbound/unbound.conf:/etc/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "unbound-host", "-r", "-t", "A", "cloudflare.com"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # --- pihole: disable host port bindings, fix static IP for CI bridge network ---
  pihole:
    # Port 53 is occupied by systemd-resolved in CI; drop host port bindings.
    # Use !reset so Docker Compose does not inherit 53:53 bindings from compose.yaml.
    ports: !reset []
    expose:
      - 53
      - 8082
    healthcheck:
      test: ["CMD", "nslookup", "cloudflare.com", "127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      frontend: {}
      lan:
        # Must be within the CI bridge subnet defined below (192.168.88.0/24).
        ipv4_address: "192.168.88.250"

# Replace the macvlan LAN network with a plain bridge for CI compatibility.
# macvlan requires a real physical parent interface (e.g. eth0) and promiscuous
# mode support that is unavailable in GitHub Actions VM runners.
networks:
  lan:
    driver: bridge
    driver_opts: !reset {}
    ipam:
      driver: default
      config:
        - subnet: 192.168.88.0/24
          gateway: 192.168.88.1

# Named volumes used by the postgres and nextcloud CI overrides above.
volumes:
  postgres_ci_data:
  nextcloud_ci_data:
  nextcloud_ci_config:
  nextcloud_ci_themes:
