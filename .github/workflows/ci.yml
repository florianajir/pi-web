name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Compose and YAML
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Docker Compose config
        run: |
          set -euo pipefail
          docker compose -f compose.yaml config >/dev/null
          docker compose -f compose.yaml -f compose.test.yaml config >/dev/null

      - name: Lint workflow and Compose YAML
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install yamllint
          yamllint -c .yamllint .

  smoke-test:
    name: Smoke Test Stack Startup
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    env:
      HOST_NAME: test.local
      USER: testuser
      EMAIL: test@example.com
      PASSWORD: testpassword123
      HOST_LAN_IP: 192.168.1.100
      TIMEZONE: UTC
      CLOUDFLARE_ZONE_ID: ci-zone-placeholder
      CLOUDFLARE_DNS_API_TOKEN: ci-token-placeholder
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create CI .env
        run: |
          set -euo pipefail
          cat > .env << 'EOF'
          HOST_NAME=test.local
          USER=testuser
          EMAIL=test@example.com
          PASSWORD=testpassword123
          HOST_LAN_IP=192.168.1.100
          TIMEZONE=UTC
          CLOUDFLARE_ZONE_ID=ci-zone-placeholder
          CLOUDFLARE_DNS_API_TOKEN=ci-token-placeholder
          EOF

      - name: Render generated configs for CI
        run: |
          set -euo pipefail
          sh ./scripts/headscale-pre-start.sh

          # Guard against bind-mount path type mismatches in CI
          test -f ./config/headplane/config.yaml
          test ! -d ./config/headplane/config.yaml
          test -f ./config/headscale/config.yaml
          test -f ./config/headscale/policy.hujson

      - name: Start stack and run smoke checks
        run: |
          set -euo pipefail
          docker compose --no-ansi -f compose.yaml -f compose.test.yaml up -d --wait --wait-timeout 360
          docker compose -f compose.yaml -f compose.test.yaml ps

          docker compose -f compose.yaml -f compose.test.yaml exec -T traefik \
            traefik healthcheck --ping >/dev/null
          docker compose -f compose.yaml -f compose.test.yaml exec -T nextcloud \
            curl -sf http://localhost/status.php >/dev/null
          docker compose -f compose.yaml -f compose.test.yaml exec -T immich-server \
            curl -fsS http://localhost:2283/api/server/ping >/dev/null

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f compose.yaml -f compose.test.yaml logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose -f compose.yaml -f compose.test.yaml down -v
