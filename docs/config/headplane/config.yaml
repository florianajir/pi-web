server:
  host: "0.0.0.0"
  port: 3000
  # Override via HEADPLANE_SERVER__COOKIE_SECRET env var (must be exactly 32 chars)
  cookie_secret: "CHANGEME_32CHARS_EXACTLY_XXXXXXX"
  cookie_secure: true
  data_path: "/var/lib/headplane"

headscale:
  url: "http://headscale:8080"
  # Headscale config is mounted read-only; config editing is view-only
  config_path: "/etc/headscale/config.yaml"
  config_strict: true

integration:
  docker:
    enabled: true
    container_label: "me.tale.headplane.target=headscale"
    socket: "unix:///var/run/docker.sock"
