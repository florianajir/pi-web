x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

x-cpu-request-tiny: &cpu-request-tiny
  resources:
    reservations:
      cpus: "0.05"

x-cpu-request-small: &cpu-request-small
  resources:
    reservations:
      cpus: "0.10"

x-cpu-request-medium: &cpu-request-medium
  resources:
    reservations:
      cpus: "0.20"

x-cpu-request-large: &cpu-request-large
  resources:
    reservations:
      cpus: "0.35"

x-cpu-request-xlarge: &cpu-request-xlarge
  resources:
    reservations:
      cpus: "0.60"

services:
  ddns-updater:
    <<: *default-logging
    image: ghcr.io/qdm12/ddns-updater:v2.9
    container_name: pi-ddns-updater
    restart: unless-stopped
    environment:
      CONFIG: >-
        {"settings":[
        {"provider":"cloudflare","zone_identifier":"${CLOUDFLARE_ZONE_ID}","domain":"${HOST_NAME}","token":"${CLOUDFLARE_DNS_API_TOKEN}","ttl":1,"proxied":false},
        {"provider":"cloudflare","zone_identifier":"${CLOUDFLARE_ZONE_ID}","domain":"*.${HOST_NAME}","token":"${CLOUDFLARE_DNS_API_TOKEN}","ttl":1,"proxied":false}
        ]}
    volumes:
      - ddns_data:/updater/data
    healthcheck:
      test: ["CMD", "/updater/ddns-updater", "healthcheck"]
      interval: 120s
      timeout: 10s
      retries: 2
      start_period: 30s
    labels:
      - "com.example.description=Dynamic DNS updater for Cloudflare"
      - "com.example.service=ddns"
    deploy: *cpu-request-tiny
    mem_limit: 64m

  watchtower:
    <<: *default-logging
    container_name: pi-watchtower
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 3 * * *
      - WATCHTOWER_NO_RESTART=true
      - TZ=${TIMEZONE:-Europe/Paris}
    healthcheck:
      test: ["CMD", "/watchtower", "--health-check"]
      interval: 120s
      timeout: 10s
      retries: 2
      start_period: 30s
    labels:
      - "com.example.description=Watchtower automatic updates"
      - "com.example.service=watchtower"
    deploy: *cpu-request-tiny
    mem_limit: 64m

  backrest:
    <<: *default-logging
    image: ghcr.io/garethgeorge/backrest:v1.12.0
    container_name: pi-backrest
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        apk add --no-cache postgresql-client jq >/dev/null
        exec /sbin/tini -- /docker-entrypoint /backrest
    networks:
      - frontend
      - immich
      - ntfy
      - nextcloud
    expose:
      - 9898
    environment:
      - BACKREST_PORT=0.0.0.0:9898
      - BACKREST_DATA=/data
      - BACKREST_CONFIG=/config/config.json
      - XDG_CACHE_HOME=/cache
      - TMPDIR=/tmp
      - TZ=${TIMEZONE:-Europe/Paris}
      - HOST_NAME=${HOST_NAME:-pi.lan}
      - DB_HOST=postgres
      - DB_NAME=nextcloud
      - DB_USER=nextcloud
      - DB_PASSWORD=${PASSWORD}
      - NEXTCLOUD_CONFIG_FILE=/userdata/nextcloud-config/config.php
      - NEXTCLOUD_SQL_BACKUP_DIR=/userdata/nextcloud-config/backups
      - NEXTCLOUD_SQL_BACKUP_KEEP=${NEXTCLOUD_SQL_BACKUP_KEEP:-30}
      - NEXTCLOUD_HOOK_STATE_FILE=/tmp/nextcloud-maintenance.state
      - RESTIC_PACK_SIZE=32
    env_file:
      - path: ./config/ntfy/ntfy.env
        required: false
    extra_hosts:
      - "ntfy.${HOST_NAME:-pi.lan}:172.30.11.1"
    volumes:
      - ${DATA_LOCATION:-./data}/backrest/data:/data
      - ${DATA_LOCATION:-./data}/backrest/config:/config
      - ${DATA_LOCATION:-./data}/backrest/repos:/repos
      - ${DATA_LOCATION:-./data}/immich:/userdata/immich:ro
      - ${DATA_LOCATION:-./data}/nextcloud:/userdata/nextcloud-data:ro
      - ${DATA_LOCATION:-./data}/nextcloud-config:/userdata/nextcloud-config
      - ${DATA_LOCATION:-./data}/nextcloud-themes:/userdata/nextcloud-themes:ro
      - ./scripts/nextcloud-db-backup.sh:/hooks/nextcloud-db-backup.sh:ro
      - ./scripts/backrest-post-hook.sh:/hooks/backrest-post-hook.sh:ro
      - ./scripts/backrest-unlock.sh:/hooks/backrest-unlock.sh:ro
    tmpfs:
      - /cache
      - /tmp
    depends_on:
      immich-server:
        condition: service_healthy
      nextcloud:
        condition: service_healthy
      postgres:
        condition: service_healthy
    labels:
      - "com.example.description=Backrest backup management"
      - "com.example.service=backrest"
      - "homepage.group=Management"
      - "homepage.name=Backrest"
      - "homepage.icon=backrest.png"
      - "homepage.href=https://backrest.${HOST_NAME:-pi.lan}"
      - "homepage.description=Backup management"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.backrest.rule=Host(`backrest.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.backrest.entrypoints=websecure"
      - "traefik.http.routers.backrest.middlewares=lan@docker"
      - "traefik.http.routers.backrest.tls=true"
      - "traefik.http.services.backrest.loadbalancer.server.port=9898"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9898/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy: *cpu-request-medium
    mem_limit: 512m

  traefik:
    <<: *default-logging
    image: traefik:v3.6
    container_name: pi-traefik
    restart: unless-stopped
    environment:
      - CLOUDFLARE_DNS_API_TOKEN=${CLOUDFLARE_DNS_API_TOKEN:-}
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--ping=true"
      # Entry Points
      - "--entrypoints.web.address=:80/tcp"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443/tcp"
      - "--entrypoints.websecure.http.middlewares=compress@docker,security-headers@docker"
      - "--entrypoints.websecure.http.tls.certresolver=cloudflare"
      - "--entrypoints.websecure.http3=true"
      - "--entrypoints.websecure.forwardedHeaders.trustedIPs=${ALLOW_IP_RANGES:-127.0.0.1/32,192.168.1.0/24,100.64.0.0/10,172.30.0.0/16}"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.watch=true"
      - "--providers.docker.network=frontend"
      - "--providers.docker.exposedbydefault=false"
      # ACME (Cloudflare DNS-01)
      - "--certificatesresolvers.cloudflare.acme.email=${EMAIL}"
      - "--certificatesresolvers.cloudflare.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cloudflare.acme.dnschallenge.delaybeforecheck=10"
    labels:
      - "com.example.description=Traefik reverse proxy"
      - "com.example.service=traefik"
      - "homepage.group=Management"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.${HOST_NAME:-pi.lan}"
      - "homepage.description=Reverse proxy dashboard"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.middlewares.compress.compress=true"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=15552000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=same-origin"
      - "traefik.http.middlewares.lan.ipallowlist.sourcerange=${ALLOW_IP_RANGES:-127.0.0.1/32,192.168.1.0/24,100.64.0.0/10,172.30.0.0/16}"
      - "traefik.http.routers.traefik.middlewares=lan@docker"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.tls.domains[0].main=${HOST_NAME:-pi.lan}"
      - "traefik.http.routers.traefik.tls.domains[0].sans=*.${HOST_NAME:-pi.lan}"
      - "traefik.http.services.traefik.loadbalancer.server.port=8080"
    ports:
      - "80:80"
      - "443:443"
    expose:
      - 8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_LOCATION:-./data}/traefik/letsencrypt:/letsencrypt
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    cpuset: "0"
    deploy: *cpu-request-medium
    mem_limit: 192m

  beszel:
    <<: *default-logging
    image: henrygd/beszel:0.18.4
    container_name: pi-beszel
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - 8090
    environment:
      - APP_URL=https://beszel.${HOST_NAME:-pi.lan}
      - USER_EMAIL=${EMAIL}
      - USER_PASSWORD=${PASSWORD}
      - AUTO_LOGIN=${EMAIL}
    volumes:
      - beszel_data:/beszel_data
      - beszel_socket:/beszel_socket
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
      interval: 90s
      timeout: 10s
      retries: 2
      start_period: 5s
    labels:
      - "com.example.description=Beszel monitoring hub"
      - "com.example.service=beszel"
      - "homepage.group=Monitoring"
      - "homepage.name=Beszel"
      - "homepage.icon=beszel.png"
      - "homepage.href=https://beszel.${HOST_NAME:-pi.lan}"
      - "homepage.description=System monitoring"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.beszel.rule=Host(`beszel.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.beszel.entrypoints=websecure"
      - "traefik.http.routers.beszel.middlewares=lan@docker"
      - "traefik.http.routers.beszel.tls=true"
      - "traefik.http.routers.beszel-agentconnect.rule=Host(`beszel.${HOST_NAME:-pi.lan}`) && PathPrefix(`/api/beszel/agent-connect`)"
      - "traefik.http.routers.beszel-agentconnect.entrypoints=websecure"
      - "traefik.http.routers.beszel-agentconnect.priority=100"
      - "traefik.http.routers.beszel-agentconnect.tls=true"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"
    deploy: *cpu-request-small
    mem_limit: 64m

  beszel-agent:
    <<: *default-logging
    image: henrygd/beszel-agent
    container_name: pi-beszel-agent
    restart: unless-stopped
    depends_on:
      beszel:
        condition: service_healthy
      traefik:
        condition: service_healthy
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel_socket:/beszel_socket
      - beszel_agent_data:/var/lib/beszel-agent
    env_file:
      - path: ./config/beszel-agent/agent.env
        required: false
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: https://beszel.${HOST_NAME:-pi.lan}
    healthcheck:
      test: ["CMD", "/agent", "health"]
      interval: 90s
      timeout: 10s
      retries: 2
    deploy: *cpu-request-small
    mem_limit: 64m

  portainer:
    <<: *default-logging
    image: portainer/portainer-ce:lts
    command: -H unix:///var/run/docker.sock --http-enabled
    container_name: pi-portainer
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - 9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    labels:
      - "com.example.description=Portainer container management"
      - "com.example.service=portainer"
      - "homepage.group=Management"
      - "homepage.name=Portainer"
      - "homepage.icon=portainer.png"
      - "homepage.href=https://portainer.${HOST_NAME:-pi.lan}"
      - "homepage.description=Container management"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.middlewares=lan@docker"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
    healthcheck:
      test: ["CMD", "/portainer", "--version"]
      interval: 90s
      timeout: 10s
      retries: 2
      start_period: 30s
    deploy: *cpu-request-small
    mem_limit: 128m

  unbound:
    <<: *default-logging
    image: mvance/unbound-rpi:1.22.0
    container_name: pi-unbound
    restart: unless-stopped
    networks:
      dns_internal:
        ipv4_address: 172.30.53.53
      dns_egress: {}
    expose:
      - 5335
    volumes:
      - ./config/unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    healthcheck:
      test: ["CMD", "drill", "@127.0.0.1", "-p", "5335", "cloudflare.com"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "com.example.description=Unbound recursive DNS resolver"
      - "com.example.service=unbound"
    deploy: *cpu-request-small
    mem_limit: 128m

  pihole:
    <<: *default-logging
    image: pihole/pihole:2026.02.0
    container_name: pi-pihole
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    expose:
      - 53
      - 8082
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    environment:
      TZ: ${TIMEZONE:-Europe/Paris}
      FTLCONF_webserver_api_password: ${PASSWORD:-admin}
      FTLCONF_webserver_allow_api_all_origins: "true"
      FTLCONF_dns_listeningMode: "all"
      FTLCONF_dns_upstreams: ${PIHOLE_DNS_UPSTREAMS:-172.30.53.53#5335}
      FTLCONF_misc_dnsmasq_lines: "address=/${HOST_NAME:-pi.lan}/${HOST_LAN_IP:-192.168.1.30}"
      FTLCONF_webserver_port: 8082
      FTLCONF_dns_domain: ${HOST_NAME:-pi.lan}
    volumes:
      - pihole_data:/etc/pihole
      - ./config/pihole/dnsmasq.d:/etc/dnsmasq.d
    networks:
      dns_internal: {}
      frontend: {}
      lan:
        ipv4_address: ${PIHOLE_IP:-192.168.1.250}
    depends_on:
      unbound:
        condition: service_healthy
    labels:
      - "com.example.description=Pi-hole DNS Ad-Blocker"
      - "com.example.service=pihole"
      - "homepage.group=Network"
      - "homepage.name=Pi-hole"
      - "homepage.icon=pi-hole.png"
      - "homepage.href=https://pihole.${HOST_NAME:-pi.lan}"
      - "homepage.description=DNS filtering"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.pihole.rule=Host(`pihole.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.pihole.entrypoints=websecure"
      - "traefik.http.routers.pihole.tls=true"
      - "traefik.http.routers.pihole.middlewares=lan@docker"
      - "traefik.http.services.pihole.loadbalancer.server.port=8082"
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "cloudflare.com"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    cpuset: "0"
    deploy: *cpu-request-medium
    mem_limit: 192m

  n8n:
    <<: *default-logging
    image: n8nio/n8n:2.8.2
    container_name: pi-n8n
    restart: unless-stopped
    expose:
      - 5678
    labels:
      - "com.example.description=n8n workflow automation"
      - "com.example.service=n8n"
      - "homepage.group=Automation"
      - "homepage.name=n8n"
      - "homepage.icon=n8n.png"
      - "homepage.href=https://n8n.${HOST_NAME:-pi.lan}"
      - "homepage.description=Workflow automation"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.routers.n8n.middlewares=lan@docker"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
    environment:
      - N8N_HOST=n8n.${HOST_NAME:-pi.lan}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.${HOST_NAME:-pi.lan}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-${TIMEZONE:-Europe/Paris}}
      - TZ=${TIMEZONE:-Europe/Paris}
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=${N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS:-true}
      - DB_TYPE=sqlite
      - DB_SQLITE_POOL_SIZE=2
    volumes:
      - n8n_data:/home/node/.n8n
      - ${DATA_LOCATION:-./data}/n8n:/files
    networks:
      - frontend
    depends_on:
      - traefik
    healthcheck:
      # n8n listens internally on plain HTTP. Use explicit IPv4 loopback to avoid IPv6 (::1) resolution issues.
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:5678/healthz",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy: *cpu-request-large
    mem_limit: 192m

  headplane:
    <<: *default-logging
    image: ghcr.io/tale/headplane:0.6.2
    container_name: pi-headplane
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - 3000
    volumes:
      - ./config/headplane/config.yaml:/etc/headplane/config.yaml:ro
      - ./config/headscale:/etc/headscale:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - headplane_data:/var/lib/headplane
    environment:
      - HEADPLANE_LOAD_ENV_OVERRIDES=true
      - HEADPLANE_HEADSCALE__URL=https://headscale.${HOST_NAME:-pi.lan}
    depends_on:
      - headscale
    labels:
      - "com.example.description=Headplane Headscale Web UI"
      - "com.example.service=headplane"
      - "homepage.group=Network"
      - "homepage.name=Headplane"
      - "homepage.icon=headscale.png"
      - "homepage.href=https://headscale.${HOST_NAME:-pi.lan}/admin"
      - "homepage.description=Headscale administration"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.headplane.rule=Host(`headscale.${HOST_NAME:-pi.lan}`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.headplane.entrypoints=websecure"
      - "traefik.http.routers.headplane.middlewares=lan@docker"
      - "traefik.http.routers.headplane.tls=true"
      - "traefik.http.routers.headplane.tls.certresolver=cloudflare"
      - "traefik.http.services.headplane.loadbalancer.server.port=3000"
    healthcheck:
      test:
        - "CMD"
        - "/nodejs/bin/node"
        - "-e"
        - >-
          const net=require('node:net');const s=net.connect({host:'127.0.0.1',port:3000},()=>{s.end();process.exit(0)});s.setTimeout(5000,()=>{s.destroy();process.exit(1)});s.on('error',()=>process.exit(1));
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy: *cpu-request-small
    mem_limit: 192m

  # Connectivity Stack
  headscale:
    <<: *default-logging
    image: headscale/headscale:0.28
    container_name: pi-headscale
    restart: unless-stopped
    command: serve
    environment:
      - HEADSCALE_SERVER_URL=https://headscale.${HOST_NAME:-pi.lan}
      - HEADSCALE_LISTEN_ADDR=0.0.0.0:8080
      - HEADSCALE_DNS_BASE_DOMAIN=tailnet.${HOST_NAME:-pi.lan}
    networks:
      - frontend
    expose:
      - 8080
      - 9090
      - 50443
    ports:
      - "3478:3478/udp"
    volumes:
      - ./config/headscale:/etc/headscale:ro
      - headscale_data:/var/lib/headscale
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /var/run/headscale
    labels:
      - "com.example.description=Headscale coordination server"
      - "com.example.service=headscale"
      - "homepage.group=Network"
      - "homepage.name=Headscale"
      - "homepage.icon=tailscale.png"
      - "homepage.href=https://headscale.${HOST_NAME:-pi.lan}"
      - "homepage.description=Private Tailnet coordination"
      - "me.tale.headplane.target=headscale"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.headscale.rule=Host(`headscale.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=cloudflare"
      - "traefik.http.routers.headscale.tls.domains[0].main=${HOST_NAME:-pi.lan}"
      - "traefik.http.routers.headscale.tls.domains[0].sans=*.${HOST_NAME:-pi.lan}"
      - "traefik.http.routers.headscale.middlewares=cors"
      - "traefik.http.routers.rewrite.rule=Host(`headscale.${HOST_NAME:-pi.lan}`) && Path(`/`)"
      - "traefik.http.routers.rewrite.service=headscale"
      - "traefik.http.routers.rewrite.middlewares=rewrite"
      - "traefik.http.services.headscale.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.rewrite.addprefix.prefix=/admin"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,POST,PUT"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=https://headscale.${HOST_NAME:-pi.lan}"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"
    healthcheck:
      test: ["CMD", "/ko-app/headscale", "health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    cpuset: "0"
    deploy: *cpu-request-medium
    mem_limit: 192m

  tailscale:
    <<: *default-logging
    image: tailscale/tailscale:stable
    container_name: pi-tailscale
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_EXTRA_ARGS=--login-server=https://headscale.${HOST_NAME:-pi.lan} --accept-dns=true --advertise-exit-node --advertise-routes=192.168.1.0/24 --accept-routes
      - TS_HOSTNAME=tailscale
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    depends_on:
      - headscale
    healthcheck:
      test: ["CMD", "tailscale", "status", "--peers=false"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "com.example.description=Tailscale VPN client"
      - "com.example.service=tailscale"
      - "homepage.group=Network"
      - "homepage.name=Tailscale"
      - "homepage.icon=tailscale.png"
      - "homepage.description=VPN mesh client"
    deploy: *cpu-request-small
    mem_limit: 128m

  immich-server:
    <<: *default-logging
    container_name: pi-immich
    image: ghcr.io/immich-app/immich-server:v2
    restart: unless-stopped
    volumes:
      - ${DATA_LOCATION:-./data}/immich:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      DB_HOSTNAME: postgres
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: ${PASSWORD}
      REDIS_HOSTNAME: redis
      TZ: ${TIMEZONE:-Europe/Paris}
    networks:
      - frontend
      - immich
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - 2283
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:2283/api/server/ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.example.description=Immich media server"
      - "com.example.service=immich"
      - "homepage.group=Storage"
      - "homepage.name=Immich"
      - "homepage.icon=immich.png"
      - "homepage.href=https://immich.${HOST_NAME:-pi.lan}"
      - "homepage.description=Photos and videos"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.immich.rule=Host(`immich.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.immich.entrypoints=websecure"
      - "traefik.http.routers.immich.middlewares=lan@docker"
      - "traefik.http.routers.immich.tls=true"
      - "traefik.http.services.immich.loadbalancer.server.port=2283"
    cpuset: "1-3"
    deploy: *cpu-request-xlarge
    mem_limit: 2304m

  nextcloud:
    <<: *default-logging
    image: nextcloud:32-apache
    container_name: pi-nextcloud
    restart: unless-stopped
    environment:
      - NEXTCLOUD_ADMIN_USER=${USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${PASSWORD}
      - NEXTCLOUD_ADMIN_EMAIL=${EMAIL}
      - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.${HOST_NAME:-pi.lan} localhost 127.0.0.1
      - NEXTCLOUD_DATA_DIR=/var/www/html/data
      - OVERWRITEHOST=nextcloud.${HOST_NAME:-pi.lan}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://nextcloud.${HOST_NAME:-pi.lan}
      - TRUSTED_PROXIES=${ALLOW_IP_RANGES:-127.0.0.1/32,192.168.1.0/24,100.64.0.0/10,172.30.0.0/16}
      - FORWARDED_FOR_HEADERS=HTTP_X_FORWARDED_FOR
      - NEXTCLOUD_MAINTENANCE_WINDOW_START=${NEXTCLOUD_MAINTENANCE_WINDOW_START:-2}
      - NEXTCLOUD_DEFAULT_PHONE_REGION=${NEXTCLOUD_DEFAULT_PHONE_REGION:-FR}
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=${PASSWORD}
      - REDIS_HOST=redis
      - TZ=${TIMEZONE:-Europe/Paris}
    volumes:
      - nextcloud_html:/var/www/html
      - ${DATA_LOCATION:-./data}/nextcloud:/var/www/html/data
      - ${DATA_LOCATION:-./data}/nextcloud-config:/var/www/html/config
      - ${DATA_LOCATION:-./data}/nextcloud-themes:/var/www/html/themes
      - ./config/nextcloud/reverse-proxy.config.php:/var/www/html/config/reverse-proxy.config.php:ro
      - ./config/nextcloud/security-headers.conf:/etc/apache2/conf-enabled/security-headers.conf:ro
    networks:
      - frontend
      - nextcloud
    labels:
      - "com.example.description=Nextcloud self-hosted storage"
      - "com.example.service=nextcloud"
      - "homepage.group=Storage"
      - "homepage.name=Nextcloud"
      - "homepage.icon=nextcloud.png"
      - "homepage.href=https://nextcloud.${HOST_NAME:-pi.lan}"
      - "homepage.description=File sync and collaboration"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.middlewares=lan@docker"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    cpuset: "1-3"
    deploy: *cpu-request-large
    mem_limit: 768m

  homepage:
    <<: *default-logging
    image: ghcr.io/gethomepage/homepage:latest
    container_name: pi-homepage
    restart: unless-stopped
    networks:
      - frontend
    expose:
      - 3000
    environment:
      - TZ=${TIMEZONE:-Europe/Paris}
      - HOMEPAGE_ALLOWED_HOSTS=homepage.${HOST_NAME:-pi.lan}
    volumes:
      - ./config/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /app/config/logs
    labels:
      - "com.example.description=Homepage service dashboard"
      - "com.example.service=homepage"
      - "homepage.group=Management"
      - "homepage.name=Homepage"
      - "homepage.icon=homepage.png"
      - "homepage.href=https://homepage.${HOST_NAME:-pi.lan}"
      - "homepage.description=Service dashboard"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.homepage.rule=Host(`homepage.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.middlewares=lan@docker"
      - "traefik.http.routers.homepage.tls=true"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
    depends_on:
      - traefik
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/"]
      interval: 90s
      timeout: 10s
      retries: 2
      start_period: 30s
    deploy: *cpu-request-small
    mem_limit: 128m

  ntfy:
    <<: *default-logging
    image: binwiederhier/ntfy:v2.17.0
    container_name: pi-ntfy
    restart: unless-stopped
    command: serve
    networks:
      - frontend
      - ntfy
    expose:
      - 80
    environment:
      - TZ=${TIMEZONE:-Europe/Paris}
      - NTFY_BASE_URL=https://ntfy.${HOST_NAME:-pi.lan}
      - NTFY_BEHIND_PROXY=true
      - NTFY_CACHE_FILE=/var/cache/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/user.db
      - NTFY_ENABLE_LOGIN=true
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
    env_file:
      - path: ./config/ntfy/ntfy.env
        required: false
    volumes:
      - ntfy_cache:/var/cache/ntfy
      - ntfy_data:/var/lib/ntfy
    labels:
      - "com.example.description=ntfy push notifications"
      - "com.example.service=ntfy"
      - "homepage.group=Automation"
      - "homepage.name=ntfy"
      - "homepage.icon=ntfy.png"
      - "homepage.href=https://ntfy.${HOST_NAME:-pi.lan}"
      - "homepage.description=Self-hosted notifications"
      - "traefik.enable=true"
      - "traefik.docker.network=frontend"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.${HOST_NAME:-pi.lan}`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.middlewares=lan@docker"
      - "traefik.http.routers.ntfy.tls=true"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/v1/health"]
      interval: 90s
      timeout: 10s
      retries: 2
      start_period: 30s
    deploy: *cpu-request-small
    mem_limit: 128m

  # Database & Cache
  postgres:
    <<: *default-logging
    container_name: pi-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      # DB_STORAGE_TYPE: 'HDD'
    volumes:
      - ${DATA_LOCATION:-./data}/postgres:/var/lib/postgresql/data
      - ./config/postgres/init-databases.sh:/docker-entrypoint-initdb.d/01-init-databases.sh
    restart: always
    networks:
      - immich
      - nextcloud
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    mem_limit: 1024m
    cpuset: "1-3"
    deploy: *cpu-request-xlarge
    shm_size: 256mb
    labels:
      - "com.example.description=PostgreSQL database for Immich & Nextcloud"
      - "com.example.service=postgres"

  redis:
    <<: *default-logging
    container_name: pi-redis
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    networks:
      - immich
      - nextcloud
    labels:
      - "com.example.description=Redis cache for Immich & Nextcloud"
      - "com.example.service=redis"
    deploy: *cpu-request-small
    mem_limit: 256m

volumes:
  ddns_data:
    labels:
      - "com.example.description=DDNS updater state"
      - "com.example.service=ddns"
  beszel_data:
    labels:
      - "com.example.description=Beszel monitoring data"
      - "com.example.service=beszel"
  beszel_agent_data:
    labels:
      - "com.example.description=Beszel agent data"
      - "com.example.service=beszel agent"
  beszel_socket:
    labels:
      - "com.example.description=Beszel shared runtime socket"
      - "com.example.service=beszel"
  portainer_data:
    labels:
      - "com.example.description=Portainer persistent data"
      - "com.example.service=portainer"
  pihole_data:
    labels:
      - "com.example.description=Pi-hole configuration data"
      - "com.example.service=pihole"
  n8n_data:
    labels:
      - "com.example.description=n8n persistent data"
      - "com.example.service=n8n"
  ntfy_cache:
    labels:
      - "com.example.description=ntfy cache and queue state"
      - "com.example.service=ntfy"
  ntfy_data:
    labels:
      - "com.example.description=ntfy auth and metadata"
      - "com.example.service=ntfy"
  nextcloud_html:
    labels:
      - "com.example.description=Nextcloud application files"
      - "com.example.service=nextcloud"
  headscale_data:
    labels:
      - "com.example.description=Headscale persistent data and keys"
      - "com.example.service=headscale"
  headplane_data:
    labels:
      - "com.example.description=Headplane persistent data"
      - "com.example.service=headplane"
  tailscale_state:
    labels:
      - "com.example.description=Tailscale persistent state"
      - "com.example.service=tailscale"

networks:
  dns_internal:
    driver: bridge
    name: dns_internal
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.30.53.0/24
          gateway: 172.30.53.1
    labels:
      - "com.example.description=Internal DNS resolver network (Pi-hole <-> Unbound)"
      - "com.example.service=dns"
  dns_egress:
    driver: bridge
    name: dns_egress
    labels:
      - "com.example.description=Unbound recursive DNS egress network"
      - "com.example.service=dns"
  frontend:
    driver: bridge
    name: frontend
    ipam:
      driver: default
      config:
        - subnet: 172.30.11.0/24
          gateway: 172.30.11.1
    labels:
      - "com.example.description=External Web Network"
      - "com.example.service=traefik"
  lan:
    driver: macvlan
    name: lan
    driver_opts:
      parent: ${HOST_LAN_PARENT:-eth0}
    ipam:
      driver: default
      config:
        - subnet: ${HOST_LAN_SUBNET:-192.168.1.0/24}
          gateway: ${HOST_LAN_GATEWAY:-192.168.1.1}
    labels:
      - "com.example.description=Physical LAN macvlan for DHCP"
      - "com.example.service=pihole"
  nextcloud:
    driver: bridge
    name: nextcloud
    internal: true
    labels:
      - "com.example.description=Nextcloud application network"
      - "com.example.service=nextcloud"
  immich:
    driver: bridge
    name: immich
    internal: true
    labels:
      - "com.example.description=Immich application network"
      - "com.example.service=immich"
  ntfy:
    driver: bridge
    name: ntfy
    internal: true
    labels:
      - "com.example.description=Internal notifications network"
      - "com.example.service=ntfy"
